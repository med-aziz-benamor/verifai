<!DOCTYPE html>
<!-- Owner: Extension Lead -->
<!-- File: extension/popup/popup.html -->
<!-- Description: Extension popup UI. Shows the URL verdict for the current tab
     and lets the user paste text or URLs for manual analysis. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifai Lens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 480px;
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #0d1424, #111c30);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: #3b7af5;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(59,122,245,0.4);
      font-size: 16px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    .header-sub {
      font-size: 11px;
      color: #64748b;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 6px;
      background: none;
      border: none;
      color: #64748b;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: #3b7af5;
      border-bottom-color: #3b7af5;
    }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    /* ── Tab panels ── */
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* ── Current page card ── */
    .page-url {
      font-size: 10px;
      color: #64748b;
      margin-bottom: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .verdict-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .verdict-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .verdict-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .verdict-value { font-size: 13px; font-weight: 700; text-transform: capitalize; }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-suspicious { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .badge-high       { background: rgba(248,113,113,0.2); color: #f87171; }
    .badge-low        { background: rgba(52,211,153,0.2);  color: #34d399; }
    .badge-medium     { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-ai         { background: rgba(167,139,250,0.2); color: #a78bfa; }

    .signals-list {
      list-style: none;
      margin-top: 8px;
    }
    .signals-list li {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 11px;
      color: #94a3b8;
      padding: 3px 0;
    }
    .signals-list li span { color: #fbbf24; flex-shrink: 0; }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }
    .score-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #3b7af5, #60a5fa);
      transition: width 0.5s ease;
    }

    /* ── Manual check form ── */
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 12px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: rgba(59,122,245,0.5); }
    .input-field::placeholder { color: #475569; }
    textarea.input-field { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px;
      margin-top: 10px;
      background: #3b7af5;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59,122,245,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover    { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59,122,245,0.4); }
    .btn:active   { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .divider { margin: 14px 0; border: none; border-top: 1px solid rgba(255,255,255,0.07); }

    .result-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      display: none;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #f87171; font-size: 11px; margin-top: 6px; }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #334155;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-mark">🛡️</div>
    <div>
      <div class="header-title">Verifai Lens</div>
      <div class="header-sub">AI Content Verification</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="current-page">Current Page</button>
    <button class="tab-btn" data-tab="check-text">Check Text</button>
    <button class="tab-btn" data-tab="check-url">Check URL</button>
  </div>

  <!-- ── Tab: Current Page ── -->
  <div id="tab-current-page" class="tab-panel active">
    <div class="page-url" id="current-url">Loading…</div>

    <div class="verdict-card" id="url-verdict-card">
      <div class="verdict-row">
        <span class="verdict-label">Verdict</span>
        <span class="verdict-value" id="url-verdict-value">—</span>
      </div>
      <div class="verdict-row">
        <span class="verdict-label">Risk Level</span>
        <span id="url-risk-badge" class="badge">—</span>
      </div>
      <div class="verdict-row">
        <span class="verdict-label">Confidence</span>
        <span id="url-confidence">—%</span>
      </div>
      <ul class="signals-list" id="url-signals"></ul>
    </div>

    <button class="btn" id="recheck-btn">🔄 Re-check This Page</button>
  </div>

  <!-- ── Tab: Check Text ── -->
  <div id="tab-check-text" class="tab-panel">
    <label class="form-label" for="text-input">Paste text to analyse</label>
    <textarea
      id="text-input"
      class="input-field"
      placeholder="Paste any article, caption, or excerpt…"
    ></textarea>
    <button class="btn" id="analyze-text-btn">Analyse Text</button>
    <p class="error-msg" id="text-error" style="display:none"></p>
    <div class="result-box" id="text-result"></div>
  </div>

  <!-- ── Tab: Check URL ── -->
  <div id="tab-check-url" class="tab-panel">
    <label class="form-label" for="url-input">Enter a URL to verify</label>
    <input
      type="url"
      id="url-input"
      class="input-field"
      placeholder="https://suspicious-site.com"
    />
    <button class="btn" id="check-url-btn">Check URL</button>
    <p class="error-msg" id="url-error" style="display:none"></p>
    <div class="result-box" id="url-result"></div>
  </div>

  <!-- Footer -->
  <div class="footer">Verifai Lens · MenaCraft Hackathon 2026</div>

  <script src="popup.js"></script>
</body>
</html>
